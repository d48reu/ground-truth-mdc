<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ground Truth MDC — Miami-Dade Property Risk</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <div id="app">
        <div id="map-container">
            <div id="search-bar">
                <form id="search-form">
                    <input type="text" id="address-input"
                           placeholder="Enter a Miami-Dade address..."
                           autocomplete="off" />
                    <button type="submit" id="search-btn">Search</button>
                </form>
            </div>
            <div id="map"></div>
        </div>
        <div id="sidebar" class="hidden">
            <button id="close-sidebar">&times;</button>
            <div id="results">
                <div id="loading" class="hidden">
                    <div class="spinner"></div>
                    <p>Analyzing property risks...</p>
                    <p class="loading-detail">Querying FEMA, FDEP, USGS, and NOAA...</p>
                </div>
                <div id="risk-card" class="hidden"></div>
            </div>
        </div>
    </div>
    <footer id="disclaimer">
        Data is approximate and provided for informational purposes only. Not a substitute for professional inspection, survey, or financial advice.
        Sources: FEMA NFHL, Florida DEP, USGS, NOAA. AI summary generated by Anthropic Claude.
    </footer>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
